- title: Talks
  content:  Whether you plan to organize a panel or hold a presentation of your own, we are open to hear your ideas! You can choose between a Lightning (~10min), short (~25min) or a long (~50min) time slot, and we will automatically set aside some audience QA time if you need it. 

- title: Workshops
  content: Teach a concrete new technique or lesson to forty new people. The duration of a workshop can be from 1 to 2 hours. 

- title: Games/Projects
  content: Parts of the venue will be dedicated to an exhibition of Godot games/projects and we would love to have you there. The layout is still in planning and details will depend on the amount of submissions we get.